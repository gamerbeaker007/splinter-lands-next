name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/splinter-lands-next

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run node unit tests
        run: npm run test:node

  release:
    name: Build, push & release
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="_No changelog entry found for ${VERSION}. Please update CHANGELOG.md._"
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          build-args: |
            APP_VERSION=${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Splinter Lands ${{ steps.version.outputs.tag }}"
          body: |
            ## What's New

            ${{ steps.changelog.outputs.notes }}

            ---

            ## Docker Usage

            ### Quick start with Docker Compose (recommended)

            ```bash
            # 1. Download the compose file
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.version.outputs.tag }}/docker-compose.yml

            # 2. Create your .env file (see variables below)
            curl -O https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.version.outputs.tag }}/.env.example
            cp .env.example .env
            # Edit .env and fill in your values

            # 3. Start everything (DB + migrations + app + worker)
            docker compose up -d
            ```

            The app will be available at **http://localhost:3000**.

            > **Migrations run automatically** — a short-lived `migrate` init container runs `prisma migrate deploy` before `app` and `worker` start. No manual migration step is needed.

            #### Updating to a new release

            ```bash
            docker compose pull
            docker compose up -d
            ```

            Migrations for the new version are applied automatically during the restart.

            > **Pinning to this release:** the compose file uses `latest` by default.
            > To lock to this version, edit `docker-compose.yml` and replace `:latest` with `:${{ steps.version.outputs.tag }}` for the `app`, `worker`, and `migrate` services.

            ### Pull a specific version

            ```bash
            docker pull ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            # or always latest:
            docker pull ${{ env.IMAGE_NAME }}:latest
            ```

            ### Required environment variables

            | Variable | Description |
            |---|---|
            | `POSTGRES_USER` | PostgreSQL username (default: `postgres`) |
            | `POSTGRES_PASSWORD` | PostgreSQL password — **change this in production** |
            | `POSTGRES_DB` | PostgreSQL database name (default: `spl`) |
            | `GITHUB_ID` | GitHub OAuth App client ID — create at https://github.com/settings/developers |
            | `GITHUB_SECRET` | GitHub OAuth App client secret |
            | `NEXTAUTH_SECRET` | Random secret for NextAuth session signing — generate with `openssl rand -base64 32` |
            | `NEXTAUTH_URL` | Public URL of your app (e.g. `http://localhost:3000` or `https://yourdomain.com`) |
            | `GITHUB_ALLOWED_USERS` | Comma-separated GitHub usernames allowed to sign in (e.g. `yourusername`) |
            | `CACHE_INVALIDATE_TOKEN` | Secret token for the `/api/revalidate` cache-invalidation endpoint |

            ### GitHub OAuth App setup

            1. Go to https://github.com/settings/developers → **New OAuth App**
            2. Set **Homepage URL** to your app URL (e.g. `http://localhost:3000`)
            3. Set **Authorization callback URL** to `<your-url>/api/auth/callback/github`
            4. Copy the **Client ID** → `GITHUB_ID`
            5. Generate a **Client Secret** → `GITHUB_SECRET`
          draft: false
          prerelease: false
